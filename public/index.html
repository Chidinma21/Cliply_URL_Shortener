<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' style='stop-color:%2360a5fa' /><stop offset='100%25' style='stop-color:%2334d399' /></linearGradient><text y=%22.9em%22 font-size=%2280%22 fill='url(%23g)'>🔗</text></svg>"
    />
    <title>Cliply | 🔗 Fast. Minimal. Cached.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      #historyList::-webkit-scrollbar {
        width: 4px;
      }
      #historyList::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 10px;
      }
    </style>
  </head>
  <body
    class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-4"
  >
    <div class="max-w-md w-full">
      <div
        class="bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700 relative overflow-hidden"
      >
        <div
          class="absolute -top-10 -right-10 w-32 h-32 bg-blue-500/10 blur-3xl rounded-full"
        ></div>

        <h1
          class="text-4xl font-black mb-2 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 text-center italic"
        >
          Cliply URL
        </h1>
        <p
          class="text-slate-400 text-center mb-8 text-sm tracking-wide uppercase font-semibold"
        >
          Fast • Minimal • Cached
        </p>

        <div class="space-y-4">
          <div>
            <label
              class="block text-xs font-bold mb-1 text-slate-500 uppercase tracking-tighter"
              >Destination URL</label
            >
            <input
              id="longUrl"
              type="url"
              placeholder="https://example.com/very-long-link"
              class="w-full p-3 bg-slate-900 border border-slate-700 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm"
            />
          </div>

          <div>
            <label
              class="block text-xs font-bold mb-1 text-slate-500 uppercase tracking-tighter"
              >Custom Alias (Optional)</label
            >
            <input
              id="customAlias"
              type="text"
              placeholder="my-awesome-link"
              class="w-full p-3 bg-slate-900 border border-slate-700 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm"
            />
          </div>

          <button
            id="shortenBtn"
            class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-lg font-bold transition-all shadow-lg shadow-blue-900/40 active:scale-95"
          >
            Clip URL
          </button>
        </div>

        <div
          id="result"
          class="mt-8 p-4 bg-slate-900/50 rounded-lg border border-dashed border-slate-600 hidden animate-in fade-in zoom-in duration-300"
        >
          <p
            class="text-xs text-slate-500 uppercase font-bold tracking-wider mb-2"
          >
            Your Short Link
          </p>
          <div class="flex items-center gap-2">
            <input
              id="shortLink"
              readonly
              class="bg-transparent text-blue-300 w-full outline-none font-mono text-sm"
            />
            <button
              onclick="copyLink()"
              class="text-xs bg-blue-500/20 text-blue-400 hover:bg-blue-500/30 px-3 py-1.5 rounded font-bold border border-blue-500/30 transition-colors"
            >
              Copy
            </button>
          </div>
        </div>
      </div>

      <div id="historySection" class="mt-8 hidden">
        <h3
          class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4 flex items-center gap-2"
        >
          <span class="w-8 h-[1px] bg-slate-700"></span> Recent Clips
        </h3>
        <div
          id="historyList"
          class="space-y-3 max-h-60 overflow-y-auto pr-1"
        ></div>
        <button
          onclick="clearHistory()"
          class="mt-4 text-[10px] text-slate-600 hover:text-red-400 uppercase font-bold tracking-widest transition-colors"
        >
          Clear History
        </button>
      </div>
    </div>

    <div
      id="toast-container"
      class="fixed bottom-5 right-5 z-50 flex flex-col gap-3"
    ></div>
    <script src="script.js"></script>
  </body>
</html>
